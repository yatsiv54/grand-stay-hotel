name: grand_stay
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  go_router: ^17.0.0
  flutter_bloc: ^9.1.1
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  get_it: ^9.1.1
  qr_flutter: ^4.1.0
  gal: ^2.3.0
  permission_handler: ^11.3.1
  screenshot: ^3.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/rooms/
    - assets/images/entertainment/
    - assets/images/entertainment/page/
    - assets/images/dining/
    - assets/images/icons/
    - assets/images/offers/
    - assets/images/home/
    - assets/images/rooms/page/
    - assets/images/qr/
    - assets/images/support/
    - assets/images/
